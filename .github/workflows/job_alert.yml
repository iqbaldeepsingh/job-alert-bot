name: Daily Job Alert Bot

on:
  schedule:
    - cron: "0 12 * * *"   # 8 AM UTC-4 → targets 9 AM Toronto (EDT), scheduled early to offset GitHub Actions delay
    - cron: "0 21 * * *"   # 5 PM UTC-4 → targets 6 PM Toronto (EDT), scheduled early to offset GitHub Actions delay
  workflow_dispatch:        # Manual trigger anytime
    inputs:
      include_us:
        description: "Include US jobs (to test which scrapers are working)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  job-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Remove stale system ChromeDriver
        run: sudo rm -f /usr/bin/chromedriver

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create directories
        run: mkdir -p logs data

      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: data/seen_jobs.json
          key: seen-jobs-${{ github.run_id }}
          restore-keys: seen-jobs-

      - name: Run Job Alert Bot
        env:
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT:    ${{ secrets.GMAIL_RECIPIENT }}
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.include_us }}" = "true" ]; then
            EXTRA="--include-us"
          fi
          if [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            python main.py --run evening $EXTRA
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            python main.py --run morning $EXTRA
          else
            python main.py --run daily $EXTRA
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/job_alert.log
          retention-days: 7
